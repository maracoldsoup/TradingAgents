services:
  tradingagents:
    build: .
    env_file:
      - .env
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    tty: true
    stdin_open: true

  research-gateway:
    build: .
    command: ["serve", "--port", "8653", "--rankings-snapshot-dir", "/home/appuser/app/.pilot/toss_rankings"]
    env_file:
      - .env
    environment:
      - RESEARCH_GATEWAY_API_KEY=${RESEARCH_GATEWAY_API_KEY:-}
    volumes:
      - research_gateway_pilot:/home/appuser/app/.pilot
    ports:
      - "8653:8653"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

  tradingagents-ollama:
    build: .
    env_file:
      - .env
    environment:
      - TRADINGAGENTS_LLM_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    volumes:
      - tradingagents_data:/home/appuser/.tradingagents
    depends_on:
      - ollama
    tty: true
    stdin_open: true
    profiles:
      - ollama

volumes:
  tradingagents_data:
  research_gateway_pilot:
  ollama_data:
